name: AI-Agent-Check

on:
  push:
    branches: [ "main" ]  # main 브랜치에 코드가 올라오면 실행
  workflow_dispatch:      # 이 줄이 있어야 아까 찾던 [Run workflow] 버튼이 생깁니다!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Run AI Agent
      env:
        # 🔑 우리가 등록한 새 API 키를 환경변수로 연결합니다.
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python agent.py
